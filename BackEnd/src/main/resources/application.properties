spring.profiles.default=dev
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/sgp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cristhian}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=${SPRING_JPA_OPEN_IN_VIEW:false}
spring.jpa.properties.hibernate.default_batch_fetch_size=${SPRING_HIBERNATE_BATCH_FETCH_SIZE:50}
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:false}
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.locations=classpath:db/migration
spring.servlet.multipart.max-file-size=60MB
spring.servlet.multipart.max-request-size=60MB
debug=${SPRING_DEBUG:false}
logging.level.root=${SPRING_LOG_LEVEL:info}
logging.level.org.springframework=${SPRING_FRAMEWORK_LOG_LEVEL:info}
logging.level.org.springframework.boot.autoconfigure.logging.ConditionEvaluationReportLogger=${SPRING_CONDITION_REPORT_LOG_LEVEL:off}
logging.level.org.hibernate.SQL=${SPRING_HIBERNATE_SQL_LOG_LEVEL:off}

# JWT
jwt.secret=${JWT_SECRET:dev-default-jwt-secret-please-change-this-32chars!}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}
